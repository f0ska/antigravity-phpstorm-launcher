name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build plugin
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Prepare distributable
        run: |
          mkdir -p release
          cp build/distributions/*.zip release/antigravity-phpstorm-launcher.zip

      - name: Upload plugin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: antigravity-phpstorm-launcher
          path: release/antigravity-phpstorm-launcher.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/antigravity-phpstorm-launcher.zip
